<!DOCTYPE html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Online Judge - 註冊</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="login.css" />
    <script>
      document.addEventListener("DOMContentLoaded", function () {
        document
          .getElementById("registerForm")
          .addEventListener("submit", async function (e) {
            e.preventDefault();
            const formData = new FormData(this);

            // 模擬 PHP 的後端驗證邏輯
            const name = formData.get("name");
            const school_num = formData.get("school_num");
            const email = formData.get("email");
            const password = formData.get("password");

            // 檢查是否所有欄位都已填寫
            if (!name || !school_num || !email || !password) {
              alert("所有欄位都必須填寫");
              return;
            }

            // 基本 email 格式驗證
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(email)) {
              alert("Email 格式不正確");
              return;
            }

            try {
              const response = await fetch("/report/LoginRegister/register.php", {
                method: "POST",
                body: formData,
              });

              if (!response.ok) {
                throw new Error(`HTTP 錯誤！狀態: ${response.status}`);
              }

              const data = await response.json();

              // 處理後端回應
              alert(data.message);
              if (data.status === "success") {
                window.location.href = "/report/LoginRegister/login.html";
              }
            } catch (error) {
              alert("發生錯誤: " + error.message);
            }
          });
      });
    </script>
  </head>
  <body>
    <div class="container">
      <h2>註冊新帳號</h2>
      <form
        id="registerForm"
        action="/report/LoginRegister/register.php"
        method="POST"
      >
        <div class="input-group">
          <label for="name">姓名</label>
          <input type="text" id="name" name="name" required />
        </div>
        <div class="input-group">
          <label for="school_num">學號</label>
          <input type="text" id="school_num" name="school_num" required />
        </div>
        <div class="input-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" required />
        </div>
        <div class="input-group">
          <label for="password">密碼</label>
          <input type="password" id="password" name="password" required />
        </div>
        <button type="submit" class="btn">註冊</button>
        <div class="switch">
          已有帳號？<a href="/report/LoginRegister/login.html">登入</a>
        </div>
        <div class="switch" style="margin-top: 10px">
          <a href="/report/LoginRegister/index.html">返回選擇</a>
        </div>
      </form>
    </div>
  </body>
</html>
