<!DOCTYPE html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Online Judge - 登入 / 註冊</title>
    <link rel="stylesheet" href="login.css" />
  </head>
  <body>
    <div class="container">
      <h2>登入帳號</h2>
      <form
        id="loginForm"
        action="/report/LoginRegister/login.php"
        method="POST"
      >
        <div class="input-group">
          <label for="school_num">學號</label>
          <input type="text" id="school_num" name="school_num" required />
        </div>
        <div class="input-group">
          <label for="password">密碼</label>
          <input type="password" id="password" name="password" required />
        </div>
        <button type="submit" class="btn">登入</button>
        <div class="switch">
          還沒有帳號？<a href="/report/LoginRegister/register.html"
            >註冊新帳號</a
          >
        </div>
        <div class="switch" style="margin-top: 10px">
          <a href="/report/LoginRegister/index.html">返回選擇</a>
        </div>
      </form>
    </div>
  </body>
</html>
